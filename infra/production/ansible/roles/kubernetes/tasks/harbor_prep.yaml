- name: Verify required secrets are defined
  ansible.builtin.assert:
    that:
      - dockerhub_username is defined
      - dockerhub_username | length > 0
      - dockerhub_token is defined
      - dockerhub_token | length > 0
    fail_msg: >
      dockerhub_username and dockerhub_token must be set in
      group_vars/all/secret.yml.
    success_msg: "Docker Hub credentials verified."

- name: Ensure harbor.home.com resolves to Traefik LB on every node
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: 'harbor\.home\.com'
    line: "10.10.10.101 harbor.home.com"
    state: present

- name: Create containerd certs.d base directory
  ansible.builtin.file:
    path: /etc/containerd/certs.d
    state: directory
    mode: '0755'

- name: Create per-registry certs.d directories
  ansible.builtin.file:
    path: "/etc/containerd/certs.d/{{ item.key }}"
    state: directory
    mode: '0755'
  loop: "{{ registry_mirrors | dict2items }}"

- name: Write hosts.toml mirror config for each registry
  ansible.builtin.copy:
    dest: "/etc/containerd/certs.d/{{ item.key }}/hosts.toml"
    content: |
      server = "{{ item.value.upstream }}"

      [host."{{ harbor_scheme }}://{{ harbor_hostname }}/v2/{{ item.value.harbor_project }}"]
        capabilities = ["pull", "resolve"]
        override_path = true
        skip_verify = true
    mode: '0644'
  loop: "{{ registry_mirrors | dict2items }}"
  register: hosts_toml

- name: Create containerd config.d directory
  ansible.builtin.file:
    path: /etc/containerd/config.d
    state: directory
    mode: '0755'

- name: Remove old dockerhub-auth.toml drop-in if present
  ansible.builtin.file:
    path: /etc/containerd/config.d/dockerhub-auth.toml
    state: absent
  register: old_dropin

- name: Write config.d drop-in — activate certs.d and DockerHub auth
  ansible.builtin.copy:
    dest: /etc/containerd/config.d/harbor-mirrors.toml
    content: |
      [plugins."io.containerd.cri.v1.images".registry]
        config_path = "/etc/containerd/certs.d"

      [plugins."io.containerd.cri.v1.images".registry.configs."registry-1.docker.io".auth]
        username = "{{ dockerhub_username }}"
        password = "{{ dockerhub_token }}"
    mode: '0600'
  no_log: true
  register: mirrors_dropin

- name: Enable config.d imports in containerd config.toml
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^imports\s*='
    line: 'imports = ["/etc/containerd/config.d/*.toml"]'
    insertafter: BOF
    backrefs: no
  register: imports_line

- name: Restart containerd if any config changed
  ansible.builtin.systemd:
    name: containerd
    state: restarted
  when: >
    hosts_toml.changed or
    old_dropin.changed or
    mirrors_dropin.changed or
    imports_line.changed

- name: Wait for containerd to stabilise
  ansible.builtin.pause:
    seconds: 3

- name: Dump effective containerd config
  ansible.builtin.command: containerd config dump
  register: containerd_dump
  changed_when: false

- name: Assert config_path is active in effective config
  ansible.builtin.assert:
    that:
      - '"/etc/containerd/certs.d" in containerd_dump.stdout'
    fail_msg: >
      containerd config dump does not show /etc/containerd/certs.d as
      config_path. Check that config.d/harbor-mirrors.toml was written
      and that the imports line is at the top of config.toml.
    success_msg: "config_path = /etc/containerd/certs.d is active."

- name: Assert DockerHub auth is present in effective config
  ansible.builtin.assert:
    that:
      - '"registry-1.docker.io" in containerd_dump.stdout'
    fail_msg: "DockerHub auth block missing from effective containerd config."
    success_msg: "DockerHub auth is active."
  no_log: true

- name: Verify containerd is running and enabled
  ansible.builtin.systemd:
    name: containerd
    state: started
    enabled: true
  register: containerd_status

- name: Assert containerd is active
  ansible.builtin.assert:
    that:
      - containerd_status.status.ActiveState == "active"
    fail_msg: "containerd failed to start — run: journalctl -u containerd -n 50"
    success_msg: "containerd is running with Harbor mirror configuration."