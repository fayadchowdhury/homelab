apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m
  timeout: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.3"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    kubeProxyReplacement: true
    k8sServiceHost: staging-control-plane
    k8sServicePort: 6443

    hubble:
      enabled: true
      relay:
        enabled: true
      ui:
        enabled: true
      metrics:
        enabled:
        - dns
        - drop
        - tcp
        - flow
        - http

    l2announcements:
      enabled: true
    loadBalancer:
      algorithm: maglev
      l2:
        enabled: true

    operator:
      replicas: 1