apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-apps
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/staging/apps
  prune: true
  wait: true
  timeout: 120m
  dependsOn:
    - name: staging-platform
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  # healthChecks: # Health checks for components
