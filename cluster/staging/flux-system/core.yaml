apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: staging-core
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/staging/core
  prune: true
  wait: true
  force: true
  timeout: 60m
  retryInterval: 30s
  dependsOn:
    - name: staging-crds
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  # healthChecks: # Health checks for components