apiVersion: batch/v1
kind: Job
metadata:
  name: portfolio-db-init
  namespace: portfolio
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: portfolio-db-init
      restartPolicy: OnFailure

      initContainers:
        - name: fetch-secrets
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for CNPG cluster to be ready..."
              until kubectl get cluster postgres-cluster -n cnpg-pods \
                -o jsonpath='{.status.phase}' 2>/dev/null \
                | grep -q "Cluster in healthy state"; do
                echo "  CNPG not ready, retrying in 5s..."
                sleep 5
              done
              echo "CNPG cluster is healthy."

              echo "Fetching superuser credentials..."
              kubectl get secret postgres-cluster-superuser -n cnpg-pods \
                -o jsonpath='{.data.username}' | base64 -d > /secrets/pg-username
              kubectl get secret postgres-cluster-superuser -n cnpg-pods \
                -o jsonpath='{.data.password}' | base64 -d > /secrets/pg-password
              echo "Credentials fetched."
          volumeMounts:
            - name: secrets
              mountPath: /secrets

      containers:
        - name: psql
          image: postgres:16
          env:
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-credentials
                  key: username
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-credentials
                  key: password
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: portfolio-db-credentials
                  key: database
          command:
            - /bin/bash
            - -c
            - |
              set -e

              export PGUSER=$(cat /secrets/pg-username)
              export PGPASSWORD=$(cat /secrets/pg-password)
              export PGHOST=postgres-cluster-rw.cnpg-pods.svc
              export PGDATABASE=postgres

              echo "Waiting for PostgreSQL to accept connections..."
              until pg_isready -h "$PGHOST"; do
                echo "  Not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."

              # ---- 1. Create role (idempotent) ----------------------------------------
              echo "Creating role ${APP_DB_USER}..."
              psql -h "$PGHOST" -v ON_ERROR_STOP=1 <<SQL
              DO \$\$
              BEGIN
                IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '${APP_DB_USER}') THEN
                  CREATE ROLE ${APP_DB_USER} LOGIN PASSWORD '${APP_DB_PASSWORD}'
                    NOSUPERUSER NOCREATEDB NOCREATEROLE;
                  RAISE NOTICE 'Role created.';
                ELSE
                  RAISE NOTICE 'Role already exists, skipping.';
                END IF;
              END \$\$;
              SQL

              # ---- 2. Create database (idempotent) ------------------------------------
              echo "Creating database ${APP_DB_NAME}..."
              psql -h "$PGHOST" -v ON_ERROR_STOP=1 <<SQL
              SELECT 'CREATE DATABASE ${APP_DB_NAME}
                OWNER ${APP_DB_USER}
                ENCODING ''UTF8''
                TEMPLATE template0'
              WHERE NOT EXISTS (
                SELECT FROM pg_database WHERE datname = '${APP_DB_NAME}'
              )\gexec
              SQL

              # ---- 3. Schema ownership + DDL + seed data (all inside portfolio DB) ----
              echo "Applying schema and seeding data into ${APP_DB_NAME}..."
              psql -h "$PGHOST" -d "${APP_DB_NAME}" -v ON_ERROR_STOP=1 <<'ENDSQL'

              -- Schema ownership (matches backup)
              ALTER SCHEMA public OWNER TO portfolio;
              GRANT ALL PRIVILEGES ON SCHEMA public TO portfolio;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public
                GRANT ALL PRIVILEGES ON TABLES TO portfolio;
              ALTER DEFAULT PRIVILEGES IN SCHEMA public
                GRANT ALL PRIVILEGES ON SEQUENCES TO portfolio;

              -- -----------------------------------------------------------------------
              -- Table: projects
              -- -----------------------------------------------------------------------
              CREATE TABLE IF NOT EXISTS public.projects (
                  id                  bigint NOT NULL,
                  owner               character varying(255),
                  repo                character varying(255),
                  description         character varying(255),
                  languages           character varying[] DEFAULT (ARRAY[]::character varying[])::character varying(255)[],
                  topics              character varying[] DEFAULT (ARRAY[]::character varying[])::character varying(255)[],
                  readme              text,
                  "imageUrl"          text,
                  "projectCreatedAt"  timestamp with time zone,
                  "projectUpdatedAt"  timestamp with time zone,
                  "createdAt"         timestamp with time zone NOT NULL,
                  "updatedAt"         timestamp with time zone NOT NULL,
                  CONSTRAINT projects_pkey PRIMARY KEY (id)
              );
              ALTER TABLE public.projects OWNER TO postgres;

              -- -----------------------------------------------------------------------
              -- Table: skills
              -- -----------------------------------------------------------------------
              CREATE TABLE IF NOT EXISTS public.skills (
                  id          uuid DEFAULT gen_random_uuid() NOT NULL,
                  name        character varying(255),
                  "iconPath"  character varying(255),
                  type        character varying(255),
                  "subType"   character varying(255),
                  "createdAt" timestamp with time zone NOT NULL,
                  "updatedAt" timestamp with time zone NOT NULL,
                  CONSTRAINT skills_pkey PRIMARY KEY (id)
              );
              ALTER TABLE public.skills OWNER TO postgres;

              -- -----------------------------------------------------------------------
              -- Table: testimonials
              -- -----------------------------------------------------------------------
              CREATE TABLE IF NOT EXISTS public.testimonials (
                  id            uuid DEFAULT gen_random_uuid() NOT NULL,
                  title         character varying(255),
                  message       character varying(255),
                  name          character varying(255),
                  designation   character varying(255),
                  "imagePath"   character varying(255),
                  rating        integer,
                  "createdAt"   timestamp with time zone NOT NULL,
                  "updatedAt"   timestamp with time zone NOT NULL,
                  CONSTRAINT testimonials_pkey PRIMARY KEY (id)
              );
              ALTER TABLE public.testimonials OWNER TO postgres;

              -- -----------------------------------------------------------------------
              -- Table: works
              -- -----------------------------------------------------------------------
              CREATE TABLE IF NOT EXISTS public.works (
                  id          uuid DEFAULT gen_random_uuid() NOT NULL,
                  "order"     integer,
                  "iconPath"  character varying(255),
                  title       character varying(255),
                  subtitle    character varying(255),
                  period      character varying(255),
                  description character varying(255),
                  items       character varying[],
                  "createdAt" timestamp with time zone NOT NULL,
                  "updatedAt" timestamp with time zone NOT NULL,
                  CONSTRAINT works_pkey PRIMARY KEY (id)
              );
              ALTER TABLE public.works OWNER TO postgres;

              -- Grant on all existing tables
              GRANT ALL ON TABLE public.projects    TO portfolio;
              GRANT ALL ON TABLE public.skills      TO portfolio;
              GRANT ALL ON TABLE public.testimonials TO portfolio;
              GRANT ALL ON TABLE public.works       TO portfolio;

