apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spark-operator
  namespace: spark-operator
spec:
  interval: 30m
  timeout: 30m
  chart:
    spec:
      chart: spark-operator
      version: '2.5.0'
      sourceRef:
        kind: HelmRepository
        name: spark-operator
        namespace: spark-operator
      interval: 12h
  
  install:
    remediation:
      retries: 3
  
  upgrade:
    remediation:
      retries: 3
  
  values:
    controller:
      nodeSelector:
        role/compute: "true"

    webhook:
      nodeSelector:
        role/compute: "true"
      enable: true
    
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    
    spark:
      jobNamespaces:
        - spark-jobs