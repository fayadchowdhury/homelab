apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-cache-warmer-job
  namespace: harbor
  annotations:
    recreate: "1"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role/store
                    operator: In
                    values:
                      - "true"
      containers:
        - name: warmer
          image: alpine:3.19
          imagePullPolicy: IfNotPresent
          env:
            - name: HARBOR_URL
              value: "harbor.home.com"
            - name: HARBOR_CORE_URL
              value: "http://harbor-core.harbor.svc.cluster.local"
            - name: HARBOR_USER
              value: "admin"
            - name: HARBOR_PASS
              valueFrom:
                secretKeyRef:
                  name: harbor-admin-secret
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Installing crane..."
              apk add --no-cache curl > /dev/null 2>&1
              CRANE_VERSION="0.19.1"
              curl -sL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
                | tar -xz -C /usr/local/bin crane
              chmod +x /usr/local/bin/crane

              echo "Waiting for Harbor to be ready..."
              until wget -qO- "$HARBOR_CORE_URL/api/v2.0/systeminfo" > /dev/null 2>&1; do
                echo "  Harbor not ready, retrying in 5s..."
                sleep 5
              done
              echo "Harbor is ready."

              echo "Logging in to Harbor..."
              crane auth login "$HARBOR_URL" \
                --insecure \
                -u "$HARBOR_USER" \
                -p "$HARBOR_PASS"

              harbor_project_for() {
                case "$1" in
                  docker.io)        echo "dockerhub" ;;
                  ghcr.io)          echo "ghcr" ;;
                  quay.io)          echo "quay" ;;
                  registry.k8s.io)  echo "k8s-registry" ;;
                  *)                echo ""; return 1 ;;
                esac
              }

              warm_image() {
                FULL_IMAGE="$1"
                REGISTRY=$(echo "$FULL_IMAGE" | cut -d/ -f1)
                IMAGE_PATH=$(echo "$FULL_IMAGE" | cut -d/ -f2-)
                PROJECT=$(harbor_project_for "$REGISTRY")
                if [ -z "$PROJECT" ]; then
                  echo "  SKIP: no proxy project for registry $REGISTRY"
                  return 0
                fi
                HARBOR_REF="$HARBOR_URL/$PROJECT/$IMAGE_PATH"
                echo "Warming: $FULL_IMAGE → $HARBOR_REF"
                crane manifest "$HARBOR_REF" --insecure > /dev/null \
                  && echo "  ✓ Cached" \
                  || echo "  ✗ Failed (will pull on-demand)"
              }

              # JupyterHub singleuser — 3.2GB, pre-cache so continuous-image-puller
              # finds it in Harbor rather than pulling from upstream on every node
              warm_image "docker.io/fayadchowdhury/data-jupyter-image:1.0.2"

              # Airflow
              warm_image "docker.io/apache/airflow:3.1.7"

              # Kubernetes system
              warm_image "registry.k8s.io/pause:3.10.1"

              # Cluster operational images
              warm_image "docker.io/alpine:3.19"
              warm_image "docker.io/postgres:16-alpine"
              warm_image "docker.io/bitnami/kubectl:latest"
              warm_image "docker.io/amazon/aws-cli:2.15.17"
              warm_image "docker.io/minio/mc:latest"
              warm_image "docker.io/curlimages/curl:8.6.0"

              echo ""
              echo "Cache warming complete."