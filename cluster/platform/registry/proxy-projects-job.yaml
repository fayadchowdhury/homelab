apiVersion: batch/v1
kind: Job
metadata:
  name: harbor-create-proxy-projects
  namespace: harbor

spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role/store
                    operator: In
                    values:
                      - "true"
      containers:
        - name: setup
          image: curlimages/curl:8.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: HARBOR_URL
              value: "http://harbor-core.harbor.svc.cluster.local"
            - name: HARBOR_USER
              value: "admin"
            - name: HARBOR_PASS
              valueFrom:
                secretKeyRef:
                  name: harbor-admin-secret
                  key: password
          command:
            - /bin/sh
            - -c
            - |
              set -e

              # Wait for Harbor API to be ready before doing anything
              echo "Waiting for Harbor..."
              until curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                "$HARBOR_URL/api/v2.0/systeminfo" > /dev/null 2>&1; do
                echo "Harbor not ready, retrying in 5s..."
                sleep 5
              done
              echo "Harbor is ready."

              # Creates a registry endpoint (upstream source).
              # Uses PUT (upsert) so re-running is safe.
              create_registry() {
                NAME=$1
                URL=$2
                TYPE=$3
                echo "Upserting registry endpoint: $NAME"
                # Get existing ID if it exists
                ID=$(curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                  "$HARBOR_URL/api/v2.0/registries?name=$NAME" | \
                  grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
                if [ -n "$ID" ]; then
                  curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                    -X PUT "$HARBOR_URL/api/v2.0/registries/$ID" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"$NAME\",\"url\":\"$URL\",\"type\":\"$TYPE\"}"
                else
                  curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                    -X POST "$HARBOR_URL/api/v2.0/registries" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"$NAME\",\"url\":\"$URL\",\"type\":\"$TYPE\"}"
                fi
              }

              # Creates a proxy cache project pointing at a registry endpoint.
              create_proxy_project() {
                PROJECT=$1
                REGISTRY_NAME=$2
                echo "Creating proxy project: $PROJECT"
                REGISTRY_ID=$(curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                  "$HARBOR_URL/api/v2.0/registries?name=$REGISTRY_NAME" | \
                  grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
                curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                  -X POST "$HARBOR_URL/api/v2.0/projects" \
                  -H "Content-Type: application/json" \
                  -d "{
                    \"project_name\": \"$PROJECT\",
                    \"public\": true,
                    \"registry_id\": $REGISTRY_ID
                  }" || true           # 409 conflict = already exists, that's fine
              }

              # One endpoint per upstream
              create_registry "dockerhub"    "https://registry-1.docker.io" "docker-hub"
              create_registry "ghcr"         "https://ghcr.io"               "harbor"
              create_registry "quay"         "https://quay.io"               "quay"
              create_registry "k8s-registry" "https://registry.k8s.io"       "harbor"

              # One proxy project per upstream
              # Pull syntax: localhost:30500/<project>/<image>:<tag>
              create_proxy_project "dockerhub"    "dockerhub"
              create_proxy_project "ghcr"         "ghcr"
              create_proxy_project "quay"         "quay"
              create_proxy_project "k8s-registry" "k8s-registry"

              # A plain (non-proxy) project for your own images
              curl -sf -u "$HARBOR_USER:$HARBOR_PASS" \
                -X POST "$HARBOR_URL/api/v2.0/projects" \
                -H "Content-Type: application/json" \
                -d '{"project_name":"local","public":true}' || true

              echo "All proxy cache projects configured."