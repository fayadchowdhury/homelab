apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: rustfs
spec:
  interval: 30m
  timeout: 20m
  
  install:
    timeout: 60m
    remediation:
      retries: 3
  
  upgrade:
    crds: Skip
    remediation:
      retries: 3
  
  chart:
    spec:
      chart: rustfs
      version: '0.0.93'
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: rustfs
      interval: 12h
  
  values:
    mode:
      standalone:
        enabled: true
      distributed:
        enabled: false

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: role/store
              operator: In
              values:
              - "true"
    
    ingress:
      enabled: false

    gatewayApi:
      enabled: true
      existingGateway:
        name: traefik-gateway
        namespace: traefik
      hostname: rustfs.home.com

    
    secret:
      existingSecret: rustfs-credentials

    storageclass:
      name: longhorn-slow-single-replica
      dataStorageSize: 1100Gi
      logStorageSize: 5Mi
      secretName: internal-tls-cert