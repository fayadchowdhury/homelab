apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: multi-namespace-superuser-access
  namespace: cnpg-pods
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: read-postgres-superuser-secret
subjects:
  - kind: ServiceAccount
    name: airflow-db-init
    namespace: airflow
  - kind: ServiceAccount
    name: portfolio-db-init
    namespace: portfolio