apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: platform-success
  namespace: flux-system
spec:
  eventMetadata:
    summary: "✅ Platform Deployment Successful"
    layer: "platform"
  providerRef:
    name: slack-deployments
  eventSeverity: info
  eventSources:
    - kind: Kustomization
      name: platform
      namespace: flux-system
  inclusionList:
    - "configured$"
    - "created$"
    - "deleted$"
    - "Health check passed"