apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/production/platform
  prune: true
  wait: true
  timeout: 120m
  dependsOn:
    - name: gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postgres-cluster
      namespace: cnpg-pods
    - apiVersion: apps/v1
      kind: Deployment
      name: rustfs
      namespace: rustfs
    - apiVersion: apps/v1
      kind: StatefulSet
      name: redis
      namespace: redis