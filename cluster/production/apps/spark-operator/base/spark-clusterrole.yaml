apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spark-role
rules:
  # Pods - Full control (driver manages executor lifecycle)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
  
  # Pod logs - For driver to collect executor logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  
  # Services - For driver headless service and UI service
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection"]
  
  # ConfigMaps - For Spark configuration and event logs
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "delete", "deletecollection", "patch", "update"]
  
  # PersistentVolumeClaims - For data access (read-only usually)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "delete", "deletecollection"]
  
  # Events - For recording job events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
