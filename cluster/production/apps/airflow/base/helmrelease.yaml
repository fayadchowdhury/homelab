apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: airflow
  namespace: airflow
spec:
  interval: 30m
  timeout: 150m
  chart:
    spec:
      chart: airflow
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: airflow
        namespace: airflow
      interval: 12h
  
  install:
    timeout: 150m
    createNamespace: false
    remediation:
      retries: 3
  
  upgrade:
    remediation:
      retries: 3
  
  values:
    executor: KubernetesExecutor
    
    postgresql:
      enabled: false
    
    data:
      metadataSecretName: airflow-metadata-db-connection

    images:
      migrationsWaitTimeout: 1800
    
    # DAGs Configuration
    dags:
      persistence:
        enabled: false
      
      gitSync:
        enabled: true
        repo: "https://github.com/fayadchowdhury/airflow-dags.git"
        branch: "master"
        rev: HEAD
        depth: 1
        subPath: ""
        wait: 60
    
    # Reference external connections secret
    secret:
      - envName: "AIRFLOW_CONN_RUSTFS"
        secretName: "airflow-rustfs-connection"
        secretKey: "AIRFLOW_CONN_RUSTFS"
    
    # Remote Logging Configuration (non-sensitive)
    env:
      - name: AIRFLOW__LOGGING__REMOTE_LOGGING
        value: "True"
      - name: AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER
        value: "s3://airflow-logs"
      - name: AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID
        value: "rustfs"
    
    createUserJob:
      # Whether the create user job should be created
      enabled: true

      # Create initial user.
      defaultUser:
        role: Admin
        username: admin
        email: admin@example.com
        firstName: admin
        lastName: user
        password: admin

      useHelmHooks: false
      applyCustomEnv: false
      extraInitContainers:
        - name: wait-for-db
          image: apache/airflow:3.1.8
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo "Waiting for airflow DB to be ready..."
                sleep 10
              done
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-db-connection
                  key: connection

    migrateDatabaseJob:
      enabled: true
      useHelmHooks: false
      applyCustomEnv: false
      extraInitContainers:
        - name: wait-for-db
          image: apache/airflow:3.1.8
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo "Waiting for airflow DB to be ready..."
                sleep 10
              done
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-db-connection
                  key: connection
    
    # Prometheus Metrics
    statsd:
      enabled: true
    
    serviceMonitor:
      enabled: true
      interval: "30s"
      labels:
        release: kube-prometheus-stack
    
    apiServer:
      extraInitContainers:
        - name: wait-for-db
          image: apache/airflow:3.1.8
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo "Waiting for airflow DB to be ready..."
                sleep 10
              done
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-db-connection
                  key: connection
      startupProbe:
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 20
        failureThreshold: 60
      livenessProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 20
        failureThreshold: 5
      readinessProbe:
        initialDelaySeconds: 15
        periodSeconds: 10
        timeoutSeconds: 20
        failureThreshold: 5

    scheduler:
      extraInitContainers:
        - name: wait-for-db
          image: apache/airflow:3.1.8
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo "Waiting for airflow DB to be ready..."
                sleep 10
              done
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-db-connection
                  key: connection
      startupProbe:
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 20
        failureThreshold: 60
      livenessProbe:
        initialDelaySeconds: 10
        periodSeconds: 60
        timeoutSeconds: 20
        failureThreshold: 5

    dagProcessor:
      extraInitContainers:
        - name: wait-for-db
          image: apache/airflow:3.1.8
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo "Waiting for airflow DB to be ready..."
                sleep 10
              done
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-db-connection
                  key: connection
      livenessProbe:
        initialDelaySeconds: 10
        periodSeconds: 60
        timeoutSeconds: 20
        failureThreshold: 5

    triggerer:
      extraInitContainers:
        - name: wait-for-db
          image: apache/airflow:3.1.8
          command:
            - /bin/bash
            - -c
            - |
              until airflow db check 2>/dev/null; do
                echo "Waiting for airflow DB to be ready..."
                sleep 10
              done
          env:
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              valueFrom:
                secretKeyRef:
                  name: airflow-metadata-db-connection
                  key: connection
      livenessProbe:
        initialDelaySeconds: 10
        periodSeconds: 60
        timeoutSeconds: 20
        failureThreshold: 5
      persistence:
        enabled: true
        size: 5Gi
        storageClassName: longhorn-fast-single-replica

    # Global Node Affinity
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: role/compute
                  operator: In
                  values:
                    - "true"