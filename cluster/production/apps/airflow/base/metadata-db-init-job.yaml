apiVersion: batch/v1
kind: Job
metadata:
  name: airflow-db-init
  namespace: airflow
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: airflow-db-init
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e

              echo "Waiting for CNPG cluster to be ready..."
              until kubectl get cluster postgres-cluster -n cnpg-pods \
                -o jsonpath='{.status.phase}' 2>/dev/null | grep -q "Cluster in healthy state"; do
                echo "  CNPG not ready, retrying in 5s..."
                sleep 5
              done
              echo "CNPG cluster is healthy."

              PG_USER=$(kubectl get secret postgres-cluster-superuser -n cnpg-pods \
                -o jsonpath='{.data.username}' | base64 -d)
              PG_PASS=$(kubectl get secret postgres-cluster-superuser -n cnpg-pods \
                -o jsonpath='{.data.password}' | base64 -d)

              PRIMARY=$(kubectl get pods -n cnpg-pods -l cnpg.io/instanceRole=primary \
                -o jsonpath='{.items[0].metadata.name}')
              echo "Primary pod: $PRIMARY"

              echo "Waiting for PostgreSQL to accept connections..."
              until kubectl exec -n cnpg-pods "$PRIMARY" -c postgres -- \
                pg_isready -U "$PG_USER" 2>/dev/null; do
                echo "  Not ready, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."

              echo "Creating role and database..."
              kubectl exec -n cnpg-pods "$PRIMARY" -c postgres -i -- \
                env PGPASSWORD="$PG_PASS" psql -U "$PG_USER" -v ON_ERROR_STOP=0 << EOF
              CREATE ROLE ${APP_DB_USER} LOGIN PASSWORD '${APP_DB_PASSWORD}'
                NOSUPERUSER NOCREATEDB NOCREATEROLE;
              CREATE DATABASE ${APP_DB_NAME} OWNER ${APP_DB_USER}
                ENCODING 'UTF8' TEMPLATE template0;
              GRANT ALL PRIVILEGES ON DATABASE ${APP_DB_NAME} TO ${APP_DB_USER};
              EOF

              echo "Database provisioning complete."
          env:
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: username
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: password
            - name: APP_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: airflow-db-credentials
                  key: database
