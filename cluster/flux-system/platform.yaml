apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 5m
  path: ./cluster/platform
  prune: true
  wait: true
  timeout: 120m
  dependsOn:
    - name: gateway
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  healthChecks:  
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: harbor
      namespace: harbor
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postgres-cluster
      namespace: cnpg-pods
    - apiVersion: apps/v1
      kind: StatefulSet
      name: minio
      namespace: minio
    - apiVersion: apps/v1
      kind: StatefulSet
      name: redis
      namespace: redis
    - apiVersion: batch/v1
      kind: Job
      name: harbor-cache-warmer-job
      namespace: harbor